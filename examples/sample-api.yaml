# MockMaster Sample API Configuration
# This is a comprehensive example showing various features

server:
  port: 8080
  host: localhost
  cors:
    enabled: true
    origins: ["*"]
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    headers: ["Content-Type", "Authorization"]
  logging:
    enabled: true
    level: info
    max_entries: 1000

# Global middleware (applied to all routes)
middleware:
  - name: delay
    config:
      min: 0
      max: 100

# Route definitions
routes:
  # Root endpoint
  - path: /
    methods: [GET]
    description: API information
    response:
      status: 200
      headers:
        Content-Type: application/json
        X-API-Version: "1.0.0"
      body:
        name: "Sample Mock API"
        version: "1.0.0"
        description: "A comprehensive example API"
        endpoints:
          - path: /health
            description: Health check
          - path: /api/users
            description: User management
          - path: /api/posts
            description: Post management

  # Health check
  - path: /health
    methods: [GET]
    description: Health check endpoint
    response:
      status: 200
      headers:
        Content-Type: application/json
        Cache-Control: no-cache
      body:
        status: healthy
        timestamp: "{{ now() }}"
        uptime: "99.9%"

  # Users list
  - path: /api/users
    methods: [GET]
    description: Get all users
    response:
      status: 200
      headers:
        Content-Type: application/json
        X-Total-Count: "10"
      body:
        users:
          - id: "{{ random_uuid() }}"
            name: "Alice Johnson"
            email: "alice@example.com"
            role: admin
            created_at: "{{ random_datetime() }}"
          - id: "{{ random_uuid() }}"
            name: "Bob Smith"
            email: "bob@example.com"
            role: user
            created_at: "{{ random_datetime() }}"
          - id: "{{ random_uuid() }}"
            name: "Charlie Brown"
            email: "charlie@example.com"
            role: user
            created_at: "{{ random_datetime() }}"
        total: 3
        page: 1
        per_page: 10

  # Create user
  - path: /api/users
    methods: [POST]
    description: Create a new user
    response:
      status: 201
      headers:
        Content-Type: application/json
        Location: "/api/users/{{ random_uuid() }}"
      delay:
        min: 100
        max: 500
      body:
        id: "{{ random_uuid() }}"
        message: "User created successfully"
        created_at: "{{ now() }}"

  # Get user by ID
  - path: /api/users/{id}
    methods: [GET]
    description: Get user by ID
    response:
      status: 200
      headers:
        Content-Type: application/json
      body:
        id: "{{ id }}"
        name: "{{ random_choice(['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank']) }}"
        email: "{{ random_email() }}"
        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed={{ id }}"
        role: "{{ random_choice(['admin', 'user', 'moderator']) }}"
        is_active: "{{ random_bool() }}"
        created_at: "{{ random_datetime() }}"
        profile:
          bio: "{{ lorem(20) }}"
          location: "{{ random_choice(['New York', 'London', 'Tokyo', 'Paris', 'Sydney']) }}"
          website: "https://example.com"

  # Update user
  - path: /api/users/{id}
    methods: [PUT, PATCH]
    description: Update user
    response:
      status: 200
      headers:
        Content-Type: application/json
      body:
        id: "{{ id }}"
        message: "User updated successfully"
        updated_at: "{{ now() }}"

  # Delete user
  - path: /api/users/{id}
    methods: [DELETE]
    description: Delete user
    response:
      status: 204
      headers: {}
      body: null

  # Posts list
  - path: /api/posts
    methods: [GET]
    description: Get all posts
    response:
      status: 200
      headers:
        Content-Type: application/json
      body:
        posts:
          - id: "{{ random_uuid() }}"
            title: "Getting Started with MockMaster"
            excerpt: "{{ lorem(15) }}"
            author:
              id: "{{ random_uuid() }}"
              name: "John Doe"
            tags: ["tutorial", "api", "mocking"]
            published_at: "{{ random_datetime() }}"
            views: "{{ random_int(100, 10000) }}"
          - id: "{{ random_uuid() }}"
            title: "Advanced Mocking Techniques"
            excerpt: "{{ lorem(15) }}"
            author:
              id: "{{ random_uuid() }}"
              name: "Jane Smith"
            tags: ["advanced", "tips"]
            published_at: "{{ random_datetime() }}"
            views: "{{ random_int(100, 10000) }}"
        total: 2
        page: 1

  # Get post by ID
  - path: /api/posts/{id}
    methods: [GET]
    description: Get post by ID
    response:
      status: 200
      headers:
        Content-Type: application/json
      body:
        id: "{{ id }}"
        title: "Sample Blog Post"
        content: "{{ lorem(50) }}"
        author:
          id: "{{ random_uuid() }}"
          name: "{{ random_choice(['Alice', 'Bob', 'Charlie']) }}"
          email: "{{ random_email() }}"
        tags: ["sample", "demo"]
        published_at: "{{ random_datetime() }}"
        reading_time: "{{ random_int(3, 15) }} min"
        likes: "{{ random_int(0, 500) }}"
        comments_count: "{{ random_int(0, 100) }}"

  # Search endpoint
  - path: /api/search
    methods: [GET]
    description: Search across all content
    response:
      status: 200
      headers:
        Content-Type: application/json
      body:
        query: "{{ query_params.q }}"
        results:
          - type: user
            id: "{{ random_uuid() }}"
            name: "Search Result 1"
            relevance: "{{ random_float(0.8, 1.0) }}"
          - type: post
            id: "{{ random_uuid() }}"
            title: "Search Result 2"
            relevance: "{{ random_float(0.6, 0.9) }}"
        total_results: 2
        search_time_ms: "{{ random_int(10, 100) }}"

  # Error simulation endpoints
  - path: /api/error/400
    methods: [GET]
    description: Simulate 400 Bad Request
    response:
      status: 400
      headers:
        Content-Type: application/json
      body:
        error:
          code: BAD_REQUEST
          message: "Invalid request parameters"
          details:
            - field: email
              message: "Invalid email format"

  - path: /api/error/401
    methods: [GET]
    description: Simulate 401 Unauthorized
    response:
      status: 401
      headers:
        Content-Type: application/json
        WWW-Authenticate: Bearer
      body:
        error:
          code: UNAUTHORIZED
          message: "Authentication required"

  - path: /api/error/403
    methods: [GET]
    description: Simulate 403 Forbidden
    response:
      status: 403
      headers:
        Content-Type: application/json
      body:
        error:
          code: FORBIDDEN
          message: "You don't have permission to access this resource"

  - path: /api/error/404
    methods: [GET]
    description: Simulate 404 Not Found
    response:
      status: 404
      headers:
        Content-Type: application/json
      body:
        error:
          code: NOT_FOUND
          message: "The requested resource was not found"

  - path: /api/error/500
    methods: [GET]
    description: Simulate 500 Internal Server Error
    response:
      status: 500
      headers:
        Content-Type: application/json
      body:
        error:
          code: INTERNAL_ERROR
          message: "An unexpected error occurred"
          request_id: "{{ random_uuid() }}"

  # Delay simulation
  - path: /api/slow
    methods: [GET]
    description: Simulate slow response
    response:
      status: 200
      delay:
        min: 1000
        max: 3000
      headers:
        Content-Type: application/json
      body:
        message: "This response was intentionally delayed"
        delay_ms: "{{ random_int(1000, 3000) }}"

  # Random data generation showcase
  - path: /api/random
    methods: [GET]
    description: Showcase random data generation
    response:
      status: 200
      headers:
        Content-Type: application/json
      body:
        string: "{{ random_string(16) }}"
        uuid: "{{ random_uuid() }}"
        email: "{{ random_email() }}"
        date: "{{ random_date() }}"
        datetime: "{{ random_datetime() }}"
        integer: "{{ random_int(1, 100) }}"
        float: "{{ random_float(0.0, 100.0) }}"
        boolean: "{{ random_bool() }}"
        choice: "{{ random_choice(['apple', 'banana', 'cherry', 'date']) }}"
        lorem: "{{ lorem(30) }}"
        now: "{{ now() }}"
        today: "{{ today() }}"